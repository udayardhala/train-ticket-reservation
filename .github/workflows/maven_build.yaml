name: Maven Build
on:
  push:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: checkout code
      uses: actions/checkout@v3

    - name: set up jave
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: validate Maven
      run: mvn validate

    - name: compile Maven
      run: mvn compile

    - name: package with Maven
      run: mvn clean package

    - name: verify war file
      run: ls-la target/


